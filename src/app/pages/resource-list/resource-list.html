<section class="resource-list">
  <h1>📚 Learning Resources</h1>

  @if (isLoading) {
    <p class="loading">Loading resources...</p>
  }

  @if (hasError) {
    <p class="error">Failed to load resources. Please try again later.</p>
  }

  @if (posts$ | async; as posts) {
    <div class="resource-grid">
      @for (post of posts.slice(0, 10); track post.id) {
        <div class="resource-card">
          <h3>{{ post.title }}</h3>
          <p>{{ post.body }}</p>
          <a [routerLink]="['/resources', post.id]">View Details →</a>
        </div>
      }
    </div>
  }
</section>
