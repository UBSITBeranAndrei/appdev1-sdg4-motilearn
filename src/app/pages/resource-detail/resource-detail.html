<section class="resource-detail">
  <a routerLink="/resources">← Back to Resources</a>

  @if (post()) {
    <div class="detail-card">
      <span class="resource-card-tag" [class]="getTagClass(post()!.userId)">
        {{ getCategory(post()!.userId) }}
      </span>
      <h1>{{ post()!.title }}</h1>
      <p>{{ post()!.body }}</p>
      <span class="badge">Resource #{{ post()!.id }}</span>
    </div>
  } @else {
    <div class="spinner"></div>
  }
</section>
